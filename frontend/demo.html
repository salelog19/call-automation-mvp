<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Tracking Demo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .phone { font-size: 24px; font-weight: bold; color: #2c3e50; }
    .ct-phone { background: yellow; padding: 5px 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Сайт с динамическим колтрекингом</h1>
  <p>Телефон для связи: <span class="phone ct-phone" data-ct-phone>+7 (495) 123-45-67</span></p>
  <p>Или позвоните: <a href="tel:+74951234567" class="ct-phone">+7 (495) 123-45-67</a></p>

  <script>
    // Configuration (using test project ID from Supabase)
    window.CallTrackingConfig = {
      projectId: '28ada9a2-6a05-4847-8aba-d51bcec3f4b6',
      defaultPhone: '+1234567890'
    };
  </script>

  <script src="ct-snippet.js"></script>
</body>
</html>
